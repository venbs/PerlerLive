<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>PerlerLive</title>
  <meta name="theme-color" content="#ffffff">
</head>

<body>
  <!-- P5.js Canvas Container -->
  <div id="canvas-container"></div>

  <!-- Loading overlay for mobile -->
  <div id="loading-overlay">
    <div class="spinner"></div>
    <span>处理中…</span>
  </div>

  <!-- Desktop Floating UI Panel -->
  <div
    id="ui-panel"
    style="backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);"
  >
    <!-- Logo -->
    <div class="logo">
      <img src="/src/assets/PerlerLive.svg" alt="PerlerLive Logo" />
    </div>

    <!-- Controls -->
    <div class="control-group inline" data-mobile-group="import-resolution">
      <label>分辨率</label>
      <input type="number" id="resolution" min="16" max="256" value="64" />
    </div>

    <div class="control-group" data-mobile-group="camera-select">
      <label for="camera-select">摄像头</label>
      <div class="select-row">
        <select id="camera-select" class="select-input">
          <option value="">检测中…</option>
        </select>
        <button
          type="button"
          id="camera-refresh-btn"
          class="icon-button"
          aria-label="刷新摄像头列表"
          title="刷新摄像头列表"
        >
          ↻
        </button>
      </div>
    </div>



    <!-- Palette Preset Switcher -->
    <div class="control-group" data-mobile-group="palette-preset">
      <label>色板风格</label>
      <div class="palette-preset-grid" id="palette-preset-grid">
        <!-- Populated by JS -->
      </div>
    </div>

    <div class="control-group inline" data-mobile-group="auto-switch-control">
      <label for="auto-switch-toggle">自动切换</label>
      <label class="toggle-switch" for="auto-switch-toggle">
        <input type="checkbox" id="auto-switch-toggle" />
        <span class="toggle-slider"></span>
      </label>
    </div>

    <div
      class="control-group auto-switch-settings-group is-collapsed"
      id="auto-switch-settings-group"
      data-mobile-group="auto-switch-settings"
    >
      <label>切换参数</label>
      <div class="style-row">
        <label>间隔时间 <span class="val" id="auto-switch-interval-val">5.0s</span></label>
        <input type="range" id="auto-switch-interval" min="1" max="30" value="5" step="0.5" />
      </div>
    </div>

    <div class="control-group inline" data-mobile-group="gesture-control">
      <label for="gesture-toggle">挥手切换</label>
      <!-- Loading spinner shown while model preloads -->
      <div class="gesture-loading" id="gesture-loading">
        <div class="gesture-loading-spinner"></div>
      </div>
      <!-- Toggle hidden until model is ready -->
      <label class="toggle-switch gesture-toggle-hidden" id="gesture-toggle-wrapper" for="gesture-toggle">
        <input type="checkbox" id="gesture-toggle" />
        <span class="toggle-slider"></span>
      </label>
    </div>

    <div
      class="control-group gesture-settings-group is-collapsed"
      id="gesture-settings-group"
      data-mobile-group="gesture-settings"
    >
      <label>挥手参数</label>
      <div class="style-row">
        <label>识别帧率 <span class="val" id="gesture-fps-val">15Hz</span></label>
        <input type="range" id="gesture-fps" min="8" max="20" value="15" step="1" />
      </div>
      <div class="style-row">
        <label>挥动距离 <span class="val" id="gesture-travel-val">12%</span></label>
        <input type="range" id="gesture-travel" min="8" max="20" value="12" step="1" />
      </div>
      <div class="style-row">
        <label>竖向容忍 <span class="val" id="gesture-vertical-val">45%</span></label>
        <input type="range" id="gesture-vertical" min="20" max="70" value="45" step="1" />
      </div>
      <div class="style-row">
        <label>单向要求 <span class="val" id="gesture-dominance-val">55%</span></label>
        <input type="range" id="gesture-dominance" min="45" max="85" value="55" step="1" />
      </div>
      <div class="style-row">
        <label>冷却时间 <span class="val" id="gesture-cooldown-val">900ms</span></label>
        <input type="range" id="gesture-cooldown" min="400" max="1500" value="900" step="50" />
      </div>
    </div>



    <div class="control-group" data-mobile-group="style-controls">
      <label>拼豆样式</label>
      <div class="style-row">
        <label>圆角 <span class="val" id="border-radius-val">50%</span></label>
        <input type="range" id="border-radius" min="0" max="100" value="50" />
      </div>
      <div class="style-row">
        <label>厚度 <span class="val" id="bevel-size-val">10%</span></label>
        <input type="range" id="bevel-size" min="0" max="20" value="10" step="1" />
      </div>
      <div class="style-row">
        <label>间隔 <span class="val" id="gap-size-val">0.5px</span></label>
        <input type="range" id="gap-size" min="0" max="3" value="0.5" step="0.5" />
      </div>
      <div class="style-row">
        <label>豆心 <span class="val" id="hole-size-val">40%</span></label>
        <input type="range" id="hole-size" min="0" max="60" value="40" step="1" />
      </div>
    </div>

    <div class="export-group is-hidden" data-mobile-group="export-buttons">
      <button id="export-png-btn">导出 PNG</button>
      <button id="export-svg-btn">复制 SVG</button>
    </div>

    <!-- Version label -->
    <div class="version-label">v0.3.0</div>
  </div>

  <!-- Mobile Bottom Sheet -->
  <div id="mobile-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-content">
      <!-- Panels are populated by JS moving desktop controls here -->
      <div class="sheet-panel" data-panel="import"></div>

      <div class="sheet-panel" data-panel="style"></div>
      <div class="sheet-panel" data-panel="export"></div>
    </div>
  </div>

  <!-- Mobile Tab Bar -->
  <nav id="mobile-tab-bar">
    <button class="tab-btn" data-tab="import">
      <span class="tab-icon">📷</span>
      <span class="tab-label">导入</span>
    </button>

    <button class="tab-btn" data-tab="style">
      <span class="tab-icon">✨</span>
      <span class="tab-label">样式</span>
    </button>
    <button class="tab-btn is-hidden" data-tab="export">
      <span class="tab-icon">⬇️</span>
      <span class="tab-label">导出</span>
    </button>
  </nav>

  <script type="module" src="/main.js"></script>
</body>

</html>
